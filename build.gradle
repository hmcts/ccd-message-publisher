plugins {
  id 'application'
  id 'java'
  id 'checkstyle'
  id 'jacoco'
  id 'com.github.ben-manes.versions' version '0.54.0'
  id 'com.github.spacialcircumstances.gradle-cucumber-reporting' version '0.1.25'
  id 'io.spring.dependency-management' version '1.1.7'
  id 'org.owasp.dependencycheck' version '12.2.0'
  id 'org.sonarqube' version '7.3.1.8318'
  id 'org.springframework.boot' version '3.5.14'
  id 'uk.gov.hmcts.java' version '0.12.70'
}

ext {
  set('springCloudVersion', '2025.0.0')
  set('spring-framework.version', '6.2.14')
  set('spring-security.version', '6.5.7')
  set('log4j2.version', '2.24.3')
  set('jackson.version', '2.18.2')
  set('snakeyaml.version', '2.3')
  appInsightsVersion  = '2.6.4'
  junit               = '6.1.0'
  junitPlatform       = '6.1.0'
  lombok              = '1.18.46'
  netty               = '4.2.15.Final'
  reformLogging       = '8.0.0'
  testcontainers      = '1.21.4'
}

configurations {
  providedRuntime
  annotationProcessor
  aatCompile.extendsFrom(testCompile)
  aatRuntime.extendsFrom(testRuntime)
  cucumberRuntime.extendsFrom(functionalRuntime)
}

application {
  mainClass = 'uk.gov.hmcts.ccd.MessagePublisherApplication'
}

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(21)
  }
}

sourceSets {
  aat {
    java {
      srcDir('src/aat/java')
      compileClasspath += main.output
      runtimeClasspath += main.output
    }
    resources {
      srcDir('src/aat/resources')
    }
  }

  integrationTest {
    java {
      compileClasspath += main.output
      runtimeClasspath += main.output
      srcDir file('src/integrationTest/java')
    }
    resources.srcDir file('src/integrationTest/resources')
  }

  smokeTest {
    java {
      compileClasspath += main.output
      runtimeClasspath += main.output
      srcDir file('src/smokeTest/java')
    }
    resources.srcDir file('src/smokeTest/resources')
  }
}

tasks.withType(Copy).configureEach {
  duplicatesStrategy = 'exclude'
}

checkstyle {
  maxWarnings = 0
  maxErrors = 0
  ignoreFailures = false
  configFile = file("${rootDir}/config/checkstyle/checkstyle.xml")
}

tasks.withType(Test) {
  useJUnitPlatform()

  testLogging {
    exceptionFormat = 'full'
  }
}

test {
  generateCucumberReports.enabled = false
  failFast = true
}

task functional(type: Test) {
  description = 'Executes functional tests against an the CCD Message Publisher API instance just deployed'
  dependsOn aatClasses
  copy {
    from "src/aat/resources/DummyTest.xml"
    into "${buildDir}/test-results/test"
  }

  doFirst {
    generateCucumberReports.enabled = true
    javaexec {
      main = "uk.gov.hmcts.ccd.messagepublisher.befta.MessagePublisherBeftaMain"
      classpath += configurations.cucumberRuntime + sourceSets.aat.runtimeClasspath + sourceSets.main.output + sourceSets.test.output
      args = [
        '--threads', '10',
        '--plugin', "json:${rootDir}/target/cucumber.json",
        '--tags', 'not @Ignore',
        '--glue', 'uk.gov.hmcts.befta.player',
        '--glue', 'uk.gov.hmcts.ccd.messagepublisher.befta', 'src/aat/resources/features'
      ]
      jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']
    }

  }

  finalizedBy {
    generateCucumberReports {
      doLast {
        delete "${rootDir}/BEFTA Report for Functional Tests/"
        new File("${rootDir}/BEFTA Report for Functional Tests").mkdirs()
        file("${rootDir}/target/cucumber/cucumber-html-reports").renameTo(file("${rootDir}/BEFTA Report for Functional Tests"))
        logger.quiet("Functional test report moved to ---> file://${rootDir}/BEFTA%20Report%20for%20Functional%20Tests/overview-features.html")
      }
    }
  }
  outputs.upToDateWhen { false }
}

task integration(type: Test) {
  description = "Runs integration tests"
  group = "Verification"
  testClassesDirs = sourceSets.integrationTest.output.classesDirs
  classpath = sourceSets.integrationTest.runtimeClasspath
  failFast = true
  shouldRunAfter test
}

task fortifyScan(type: JavaExec) {
  mainClass = "uk.gov.hmcts.fortifyclient.FortifyClientMainApp"
  classpath += sourceSets.test.runtimeClasspath
  jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']
}

task smoke(type: JavaExec) {
  description = 'Executes smoke tests against an the CCD Data Store API instance just deployed'
  dependsOn aatClasses
  def localSmokeTestUrl = providers.environmentVariable('SERVER_PORT')
    .map { "http://localhost:${it}" }
    .orElse('http://localhost:4456')
  def smokeTestUrl = providers.gradleProperty('smokeTestUrl')
    .orElse(providers.environmentVariable('SMOKE_TEST_URL'))
    .orElse(providers.environmentVariable('TEST_URL').map { testUrl ->
      testUrl.contains('://localhost') ? localSmokeTestUrl.get() : testUrl
    })
    .orElse(localSmokeTestUrl)

  copy {
    from "src/aat/resources/DummyTest.xml"
    into "${buildDir}/test-results/test"
  }

  doFirst {
    environment 'TEST_URL', smokeTestUrl.get()
    logger.lifecycle("Running smoke tests against ${smokeTestUrl.get()}")
    generateCucumberReports.enabled = true
  }

  mainClass = "uk.gov.hmcts.ccd.messagepublisher.befta.MessagePublisherBeftaMain"
  classpath += configurations.cucumberRuntime + sourceSets.aat.runtimeClasspath
  args = ['--plugin', "json:${rootDir}/target/cucumber.json", '--tags', '@Smoke and not @Ignore', '--glue',
          'uk.gov.hmcts.befta.player', '--glue', "uk.gov.hmcts.ccd.messagepublisher.befta", 'src/aat/resources/features']
  jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']

  finalizedBy {
    generateCucumberReports {
      doLast {
        delete "${rootDir}/BEFTA Report for Smoke Tests/"
        new File("${rootDir}/BEFTA Report for Smoke Tests").mkdirs()
        file("${rootDir}/target/cucumber/cucumber-html-reports").renameTo(file("${rootDir}/BEFTA Report for Smoke Tests"))
        logger.quiet("Smoke test report moved to ---> file://${rootDir}/BEFTA%20Report%20for%20Smoke%20Tests/overview-features.html")
      }
    }
  }

  outputs.upToDateWhen { false }
}

check.dependsOn integration

jacocoTestReport {
  executionData(test, integration)
  reports {
    xml.required = true
    csv.required = false
    xml.outputLocation = file("${buildDir}/reports/jacoco/test/jacocoTestReport.xml")
  }
}

project.tasks['sonarqube'].dependsOn jacocoTestReport

sonarqube {
  properties {
    property "sonar.projectName", "Reform :: ccd-message-publisher"
    property "sonar.projectKey", "uk.gov.hmcts.reform:ccd-message-publisher"
    property "sonar.coverage.jacoco.xmlReportPaths", "${jacocoTestReport.reports.xml.outputLocation.get().asFile.path}"
  }
}

configurations.all {
  exclude group:"io.netty", module: "netty-transport-classes-epoll"
  exclude group:"io.netty", module:"netty-transport-classes-kqueue"
}

// before committing a change, make sure task still works
dependencyUpdates {
  def isNonStable = { String version ->
    def stableKeyword = ['RELEASE', 'FINAL', 'GA'].any { qualifier -> version.toUpperCase().contains(qualifier) }
    def regex = /^[0-9,.v-]+$/
    return !stableKeyword && !(version ==~ regex)
  }
  rejectVersionIf { selection -> // <---- notice how the closure argument is named
    return isNonStable(selection.candidate.version) && !isNonStable(selection.currentVersion)
  }
}

// https://jeremylong.github.io/DependencyCheck/dependency-check-gradle/configuration.html
apply from: './gradle/suppress.gradle'
dependencyCheck {
  failBuildOnCVSS = 0
  scanConfigurations = ['runtimeClasspath']
  analyzers {
    assemblyEnabled = false
    centralEnabled = false
    retirejs {
      enabled = false
    }
    ossIndex {
      enabled = false
    }
  }
  formats = ['HTML', 'XML']
  suppressionFiles = ['config/owasp/suppressions.xml']
}

tasks.register("printSuppressionFile") {
  doLast {
    def suppressionFile = dependencyCheck.getSuppressionFiles()
    if (suppressionFile?.metaClass?.respondsTo(suppressionFile, "getOrNull")) {
      suppressionFile = suppressionFile.getOrNull()
    } else if (suppressionFile?.metaClass?.respondsTo(suppressionFile, "get")) {
      suppressionFile = suppressionFile.get()
    }
    if (suppressionFile instanceof Collection) {
      suppressionFile = suppressionFile.find { it }?.toString()
    }
    println "SUPPRESSION_FILE=${suppressionFile}"
  }
}

dependencyManagement {
  imports {
    mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
  }
}

cucumberReports {
  outputDir = file("${projectDir}/target/cucumber")
  reports = files("${projectDir}/target/cucumber.json")
  notFailingStatuses = ["skipped", "passed"]
}

repositories {
  mavenLocal()
  mavenCentral()
  maven {
    name = "AzureArtifacts"
    url = uri("https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/hmcts-lib/maven/v1")
  }
}

afterEvaluate {
  def priority = [
    'MavenLocal': 0,
    'MavenRepo': 1,
    'maven': 2
  ]
  def sorted = repositories.toList().sort { a, b ->
    def pa = priority.containsKey(a.name) ? priority[a.name] : Integer.MAX_VALUE
    def pb = priority.containsKey(b.name) ? priority[b.name] : Integer.MAX_VALUE
    pa <=> pb
  }
  repositories.clear()
  sorted.each { repositories.add(it) }
}

ext.libraries = [
  junit5: [
    "org.junit.jupiter:junit-jupiter-api:${junit}",
    "org.junit.jupiter:junit-jupiter-engine:${junit}",
    "org.junit.jupiter:junit-jupiter-params:${junit}",
    "org.junit.platform:junit-platform-commons:${junitPlatform}",
    "org.junit.platform:junit-platform-engine:${junitPlatform}",
    "org.junit.platform:junit-platform-launcher:${junitPlatform}",
    "org.apiguardian:apiguardian-api:1.1.2"
  ]
]

dependencies {

  // start::CVE Vulnerability dependency overrides                                                        // MAIN PARENT DEPENDEDNCY

  // Put CVE vulnerability dependency overrides here e.g.
  // implementation 'com.example:example-lib:1.2.3'

  // end::CVE Vulnerability dependency overrides                                                          // MAIN PARENT DEPENDEDNCY

  // Spring
  implementation 'org.springframework.boot:spring-boot-starter'
  implementation 'org.springframework.boot:spring-boot-starter-web'
  implementation 'org.springframework.boot:spring-boot-starter-actuator'
  implementation 'org.springframework.boot:spring-boot-starter-aop'
  implementation 'org.springframework.boot:spring-boot-starter-json'
  implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
  implementation 'org.springframework.boot:spring-boot-autoconfigure'
  implementation 'org.springframework.boot:spring-boot-starter-activemq'
  implementation 'org.springframework.cloud:spring-cloud-starter'
  implementation 'org.springframework.cloud:spring-cloud-starter-bootstrap'
  implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.17'

  // Netty
  implementation "io.netty:netty-buffer:${netty}"
  implementation "io.netty:netty-codec:${netty}"
  implementation "io.netty:netty-codec-http:${netty}"
  implementation "io.netty:netty-common:${netty}"
  implementation "io.netty:netty-handler:${netty}"
  implementation "io.netty:netty-resolver:${netty}"
  implementation "io.netty:netty-transport:${netty}"
  implementation "io.netty:netty-transport-native-epoll:${netty}"
  implementation "io.netty:netty-transport-native-kqueue:${netty}"
  implementation "io.netty:netty-transport-native-unix-common:${netty}"


  implementation 'commons-fileupload:commons-fileupload:1.6.0'
  implementation 'com.azure.spring:spring-cloud-azure-starter-servicebus-jms:5.25.0'
  implementation "com.github.hmcts.java-logging:logging:${reformLogging}"
  implementation "com.microsoft.azure:applicationinsights-logging-logback:${appInsightsVersion}"
  implementation "com.microsoft.azure:applicationinsights-spring-boot-starter:${appInsightsVersion}"
  implementation 'com.vladmihalcea:hibernate-types-60:2.21.1'
  implementation 'io.hawt:hawtio-springboot:5.2.0'
  implementation 'jakarta.el:jakarta.el-api:6.0.1'
  implementation 'org.apache.activemq:activemq-client:6.2.6'
  implementation 'org.apache.activemq:activemq-broker:6.2.6'
  implementation 'org.apache.httpcomponents.client5:httpclient5:5.6.1'
  implementation "org.projectlombok:lombok:${lombok}"

  annotationProcessor "org.projectlombok:lombok:${lombok}"
  runtimeOnly 'org.postgresql:postgresql:42.7.11'


  testImplementation libraries.junit5
  testImplementation 'org.springframework.boot:spring-boot-starter-test'
  testImplementation 'com.github.hmcts:fortify-client:1.4.10:all'
  testAnnotationProcessor "org.projectlombok:lombok:${lombok}"

  integrationTestImplementation sourceSets.main.runtimeClasspath
  integrationTestImplementation sourceSets.test.runtimeClasspath
  integrationTestImplementation "org.testcontainers:testcontainers:${testcontainers}"
  integrationTestImplementation "org.testcontainers:junit-jupiter:${testcontainers}"
  integrationTestImplementation "org.testcontainers:postgresql:${testcontainers}"

  smokeTestImplementation sourceSets.main.runtimeClasspath
  smokeTestImplementation sourceSets.test.runtimeClasspath

  aatImplementation sourceSets.main.runtimeClasspath
  aatImplementation sourceSets.test.runtimeClasspath
  aatImplementation 'com.github.hmcts:ccd-test-definitions:7.27.7-prerelease-CME-537'
  aatImplementation 'com.github.hmcts:befta-fw:9.2.6'

}

bootJar {
  archiveBaseName = 'ccd-message-publisher'
  manifest {

    attributes 'Implementation-Title': project.name,
      'Implementation-Version': project.version
  }
}

wrapper {
  distributionType = Wrapper.DistributionType.ALL
}
